server:
  port: 8090

spring:
  application:
    name: citas
    kafka:
      producer:
        bootstrap-server: localhost:9092

  datasource:
    url: jdbc:postgresql://localhost:5432/citas
    username: postgres
    password: 265359

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      default-zone: http://localhost:8761/eureka